<header class="navbar navbar-expand bg-white border-bottom px-3 py-2">
  <div class="container-fluid p-0">
    <div class="d-flex align-items-center gap-2 min-w-0">
      <button
        type="button"
        class="btn btn-outline-secondary btn-sm mobile-menu-btn"
        (click)="toggleMobileMenu()"
        aria-label="Toggle navigation menu"
      >
        <span aria-hidden="true">☰</span>
      </button>

      <img ngSrc="logo.png" width="32" height="32" alt="5S Audit logo" priority />
      <h1 class="navbar-title h5 mb-0">5S Audit System</h1>
    </div>

    <div class="d-flex align-items-center gap-2">
      <button type="button" class="btn btn-outline-primary btn-sm" (click)="goToMyProfile()">
        My Profile
      </button>
      <button type="button" class="btn btn-outline-danger btn-sm logout-btn" (click)="logout()">Logout</button>
    </div>
  </div>
</header>
